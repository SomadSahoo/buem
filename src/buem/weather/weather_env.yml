# Conda environment for the COSMO-REA6 weather pipeline (standalone).
# This environment contains ONLY the packages needed for weather processing.
# It does NOT include buem core dependencies (cvxpy, flask, etc.).
#
# Usage on Snellius or any HPC server:
#   conda env create -f weather_env.yml
#   conda activate weather_env
#   python -m buem.weather info
#
name: weather_env
channels:
  - conda-forge
dependencies:
  - python=3.13
  # --- Weather pipeline core (alphabetical) ---
  - cfgrib
  - dask
  - distributed           # dask.distributed for multi-worker parallelism
  - eccodes
  - lbzip2                # fast parallel bzip2 decompressor
  - netcdf4
  - numpy
  - pandas
  - pyproj
  - python-dotenv
  - scipy
  - xarray
  # --- Optional but recommended ---
  - pvlib              # solar position (used by from_csv, not pipeline itself)
  - pyarrow            # fast Parquet I/O (optional)

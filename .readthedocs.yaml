# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

formats: all

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/source/conf.py

# Install the package so setuptools-scm resolves the version and
# the [docs] extra pulls in Sphinx + theme.
python:
  install:
  - method: pip
    path: .
    extra_requirements:
      - docs